name: Build ImmortalWrt x86_64 with turboacc

on:
  workflow_dispatch:      # 手动触发，在 Actions 页面点 "Run workflow"
  # push:
  #   branches: [main]    # 如果想 push 自动触发，把这两行取消注释

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt.git
  REPO_BRANCH: openwrt-25.12          # ImmortalWrt 25.12 分支，对应内核 6.12
  ARCH: x86_64                        # 按你实际路由器/VM 架构改，比如 aarch64 用 target/subtarget 对应值改掉
  TARGET: x86
  SUBTARGET: 64
  TURBOACC_SCRIPT: https://raw.githubusercontent.com/mufeng05/turboacc/main/add_turboacc.sh

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af 2>/dev/null || true
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget \
            libelf-dev ecj fastjar java-propose-classpath \
            qemu-utils subversion

      - name: Clone ImmortalWrt source
        run: |
          git clone --depth=1 --branch "${{ env.REPO_BRANCH }}" "${{ env.REPO_URL }}" openwrt
          cd openwrt
          echo "Checked out branch: ${{ env.REPO_BRANCH }}"

      - name: Update & install feeds
        working-directory: openwrt
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Inject turboacc (mufeng05)
        working-directory: openwrt
        run: |
          curl -sSL "${{ env.TURBOACC_SCRIPT }}" -o add_turboacc.sh
          bash add_turboacc.sh

      - name: Generate .config
        working-directory: openwrt
        run: |
          cat > .config <<EOF
          CONFIG_TARGET_${{ env.TARGET }}=y
          CONFIG_TARGET_${{ env.TARGET }}_${{ env.SUBTARGET }}=y
          CONFIG_TARGET_${{ env.TARGET }}_${{ env.SUBTARGET }}_DEVICE_generic=y
          CONFIG_PACKAGE_luci-app-turboacc=y
          CONFIG_PACKAGE_luci-i18n-turboacc-zh-cn=y
          EOF
          make defconfig

      - name: Show turboacc-related config (sanity check)
        working-directory: openwrt
        run: |
          grep -i turboacc .config || echo "WARNING: turboacc not found in .config, check target/device names above"

      - name: Download package sources
        working-directory: openwrt
        run: |
          make download -j8
          find dl -size -1024c -exec ls -l {} \;

      - name: Build firmware
        working-directory: openwrt
        run: |
          make -j$(nproc) V=s || make -j1 V=s

      - name: Organize build output
        run: |
          mkdir -p artifact
          find openwrt/bin/targets -type f \( -name "*.img.gz" -o -name "*combined*" -o -name "*sysupgrade*" -o -name "*.manifest" \) -exec cp {} artifact/ \;
          find openwrt/bin/packages -iname "*turboacc*" -exec cp {} artifact/ \;
          ls -lh artifact/

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-${{ env.REPO_BRANCH }}-${{ env.TARGET }}-${{ env.SUBTARGET }}-turboacc
          path: artifact/
          retention-days: 7
